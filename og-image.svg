<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0D14"/>
      <stop offset="60%" stop-color="#10131C"/>
      <stop offset="100%" stop-color="#161922"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5B95F0" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#5B95F0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5B95F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B95F0"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="url(#accent)" opacity="0.95"/>
    <g transform="translate(28, 28)" stroke="#0B0D14" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M0 -14L-12 -7L0 0L12 -7Z"/>
      <path d="M-12 0L0 7L12 0"/>
      <path d="M-12 7L0 14L12 7"/>
    </g>
  </g>

  <!-- Brand text -->
  <g transform="translate(160, 110)">
    <text font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="22" fill="#F5F7FA" letter-spacing="0.5">AI TRAINER</text>
    <text y="26" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#9CA3AF" letter-spacing="2">PORTFOLIO · 2026</text>
  </g>

  <!-- Main title -->
  <g transform="translate(80, 280)">
    <text font-family="'Noto Serif SC', 'Cormorant Garamond', serif" font-weight="500" font-size="92" fill="#FFFFFF" letter-spacing="-2">彭乙东</text>
    <text y="120" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="56" fill="url(#accent)" letter-spacing="-1">AI 训练师</text>
    <text y="200" font-family="'Noto Sans SC', Inter, sans-serif" font-weight="300" font-size="28" fill="#B8BEC9" letter-spacing="2">跨界复合 · 以多元阅历赋能智能数据训练</text>
  </g>

  <!-- Footer info -->
  <g transform="translate(80, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#accent)" stroke-width="2"/>
    <text y="36" font-family="JetBrains Mono, monospace" font-weight="400" font-size="16" fill="#6B7280" letter-spacing="1">aidon-1.github.io</text>
  </g>
</svg>
